# action.yml
name: setup-lua
description: "GitHub Action to install and setup the Lua"

branding:
  icon: "settings"
  color: "blue"

inputs:
  lua-version:
    description: "The version of Lua to install"
    required: true
    default: "latest"
  luaroocks-version:
    description: "The version of Luarocks to install"
    required: true
    default: "latest"
  platform:
    description: "The platform optimization option for Lua (not used in LuaJIT builds)"
    required: false
    default: "posix"

runs:
  using: "composite"
  steps:
    - name: Download lenv
      shell: bash
      run: |
        wget https://github.com/mah0x211/lenv/releases/download/v0.7.0/lenv_Linux_x86_64.tar.gz -O ./lenv.tar.gz
        tar xvzf ./lenv.tar.gz

    - name: Install lenv
      shell: bash
      run: |
        tar xvzf ./lenv.tar.gz
        mkdir -p $HOME/.local/bin
        mv ./lenv $HOME/.local/bin
        echo "$HOME/.local/bin:$PATH" >> $GITHUB_PATH

    - name: Setup lenv
      shell: bash
      run: |
        lenv setup
        lenv path bin >> $GITHUB_PATH
        echo "LUA_PATH=$(lenv path lualib)" >> $GITHUB_ENV
        echo "LUA_CPATH=$(lenv path luaclib)" >> $GITHUB_ENV
        lenv fetch

    - name: Install Lua and Luarocks
      shell: bash
      run: |
        if [[ "${{ inputs.lua-version }}" == lj-* ]]; then
          lenv install ${{ inputs.lua-version }}:${{ inputs.luarocks-version }}
        else
          lenv install ${{ inputs.lua-version }}:${{ inputs.luarocks-version }} ${{ inputs.platform }}
        fi
